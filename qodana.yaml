version: "1.0"
linter: jetbrains/qodana-cdnet:2025.3-eap
profile:
  name: qodana.recommended
dotnet:
  solution: tye2.sln
  configuration: Release
bootstrap: |
  dotnet sln tye2.sln remove $(find test -name "*.csproj")
exclude:
  - name: CheckDependencyLicenses
  - name: All
    paths:
      - test
