next-version: 0.11.0
workflow: GitHubFlow/v1
commit-message-incrementing: Disabled
strategies:
  - Fallback
  - ConfiguredNextVersion
  - MergeMessage
  - TaggedCommit
  - TrackReleaseBranches
  - VersionInBranchName
  - Mainline
branches:
  main:
    increment: None
  feature:
    increment: None
  bugfix:
    increment: None
  hotfix:
    increment: None
  release:
    increment: None
  pull-request:
    increment: None
ignore:
  sha: []
merge-message-formats: {}
