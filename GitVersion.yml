next-version: 0.12.0
workflow: GitHubFlow/v1
commit-message-incrementing: Disabled
strategies:
  - Fallback
  - ConfiguredNextVersion
  - MergeMessage
  - TaggedCommit
  - TrackReleaseBranches
  - VersionInBranchName
  - Mainline
branches:
  main:
    increment: None
  feature:
    regex: '^features?[/-]'
    increment: None
  bugfix:
    regex: '^bugfix(es)?[/-]'
    increment: None
  hotfix:
    regex: '^hotfix(es)?[/-]'
    increment: None
  release:
    regex: '^releases?[/-]'
    increment: None
  pull-request:
    regex: '^(pull|pull-requests|pr)[/-]'
    increment: None
ignore:
  sha: []
merge-message-formats: {}
